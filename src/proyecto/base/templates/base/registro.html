{% extends 'base/principal.html' %}
{% block content %}

<div class="barra-superior">
  <h1>Registrarse</h1>
</div>

<div class="cuerpo-tarjeta">
  <form method="post">
  {% csrf_token %}
    <label>{{form.username.label}}</label>
    {{form.username}}

    <label>{{form.password1.label}}</label>
    {{form.password1}}

    <label>{{form.password2.label}}</label>
    {{form.password2}}

  <input style="margin-top: 10;" class="boton" type="submit" value="Registrar">
  </form>
  <p>¿Ya tienes una cuenta?</p> <a href="{% url 'login' %}">Incia Sesión</a>
</div>




{% endblock content %}
